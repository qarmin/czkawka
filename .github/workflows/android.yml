name: 🤖 Android APK

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Android APK
    runs-on: ubuntu-latest
    env:
      NDK_VERSION: 26.3.11579264

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java (required by Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/cmdline-tools
            ${{ env.ANDROID_SDK_ROOT }}/ndk
            ${{ env.ANDROID_SDK_ROOT }}/platforms
            ${{ env.ANDROID_SDK_ROOT }}/platform-tools
            ${{ env.ANDROID_SDK_ROOT }}/build-tools
          key: ${{ runner.os }}-android-sdk-${{ env.NDK_VERSION }}
          restore-keys: |
            ${{ runner.os }}-android-sdk-

      - name: Install Android NDK and tools
        run: |
          rustup target add aarch64-linux-android
          cargo install cargo-apk || true

          yes | sdkmanager --install "ndk;${NDK_VERSION}"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-android-v1
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate keystores
        run: |
          sudo apt update || true
          sudo apt install -y just

          just gen_keystores

      - name: Build APK (release)
        if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
        run: |
          echo "VERS=release" >> $GITHUB_ENV
          cargo apk build -p cedinia --lib --release
          mv target/release/apk/cedinia.apk cedinia.apk

      - name: Build APK (debug)
        if: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}
        run: |
          echo "VERS=debug" >> $GITHUB_ENV
          cargo apk build -p cedinia --lib
          mv target/debug/apk/cedinia.apk cedinia.apk

      - name: Upload APK artifact
        uses: actions/upload-artifact@v6
        with:
          name: cedinia-${{ env.VERS }}
          path: cedinia.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        if: ${{ github.ref == 'refs/heads/master' && vars.HAVE_PAT_REPOSITORY_TOKEN == '1' }}
        with:
          tag_name: "Nightly"
          files: |
            cedinia.apk
          token: ${{ secrets.PAT_REPOSITORY }}

  build-apk-multi:
    name: Build Android APK (Multi-ABI)
    runs-on: ubuntu-latest
    env:
      # NDK releases: https://developer.android.com/ndk/downloads/revision_history
      # Latest stable NDK r27 (27.2.12479018); r28+ may drop armv7 support
      NDK_VERSION: 27.2.12479018
      # API levels & cumulative device share: https://apilevels.com/
      # 21=Android 5.0 (99.8%), 26=Android 8.0 (94.8%), 28=Android 9.0 (91.8%)
      # Google Play min target SDK policy: https://developer.android.com/google/play/requirements/target-sdk
      MIN_SDK_VERSION: 26
      # target_sdk_version: Google Play requires ≥34 now, ≥35 from 2025-08-31
      TARGET_SDK_VERSION: 35

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Java (required by Android SDK)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Android SDK
        uses: actions/cache@v4
        with:
          path: |
            ${{ env.ANDROID_SDK_ROOT }}/cmdline-tools
            ${{ env.ANDROID_SDK_ROOT }}/ndk
            ${{ env.ANDROID_SDK_ROOT }}/platforms
            ${{ env.ANDROID_SDK_ROOT }}/platform-tools
            ${{ env.ANDROID_SDK_ROOT }}/build-tools
          key: ${{ runner.os }}-android-sdk-${{ env.NDK_VERSION }}-multi
          restore-keys: |
            ${{ runner.os }}-android-sdk-${{ env.NDK_VERSION }}-multi

      - name: Install Android NDK, platforms and Rust targets
        run: |
          rustup target add aarch64-linux-android armv7-linux-androideabi
          cargo install cargo-apk || true

          yes | sdkmanager --install \
            "ndk;${NDK_VERSION}" \
            "platforms;android-${TARGET_SDK_VERSION}" \
            "build-tools;${TARGET_SDK_VERSION}.0.0"
          echo "ANDROID_NDK_ROOT=$ANDROID_HOME/ndk/${NDK_VERSION}" >> $GITHUB_ENV

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-android-multi
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Generate keystores
        run: |
          sudo apt update || true
          sudo apt install -y just

          just gen_keystores

      - name: Patch Cargo.toml – set min/target SDK versions
        run: |
          sed -i "s/min_sdk_version = .*/min_sdk_version = ${MIN_SDK_VERSION}/" cedinia/Cargo.toml
          sed -i "s/target_sdk_version = .*/target_sdk_version = ${TARGET_SDK_VERSION}/" cedinia/Cargo.toml

      - name: Build APK (release)
        if: ${{ github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main' }}
        run: |
          echo "VERS=release" >> $GITHUB_ENV
          cargo apk build -p cedinia --lib --release --target aarch64-linux-android
          mv target/release/apk/cedinia.apk cedinia-arm64.apk
          
          cargo apk build -p cedinia --lib --release --target armv7-linux-androideabi
          mv target/release/apk/cedinia.apk cedinia-armv7.apk
          
          sed -i '/^\[package\.metadata\.android\]$/a build_targets = ["aarch64-linux-android", "armv7-linux-androideabi"]' cedinia/Cargo.toml
          cargo apk build -p cedinia --lib --release
          mv target/release/apk/cedinia.apk cedinia-universal.apk

      - name: Build APK (debug)
        if: ${{ github.ref != 'refs/heads/master' && github.ref != 'refs/heads/main' }}
        run: |
          echo "VERS=debug" >> $GITHUB_ENV
          cargo apk build -p cedinia --lib --target aarch64-linux-android
          mv target/debug/apk/cedinia.apk cedinia-arm64.apk
          
          cargo apk build -p cedinia --lib --target armv7-linux-androideabi
          mv target/debug/apk/cedinia.apk cedinia-armv7.apk
          
          sed -i '/^\[package\.metadata\.android\]$/a build_targets = ["aarch64-linux-android", "armv7-linux-androideabi"]' cedinia/Cargo.toml
          cargo apk build -p cedinia --lib
          mv target/debug/apk/cedinia.apk cedinia-universal.apk

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v6
        with:
          name: cedinia-multi-${{ env.VERS }}
          path: |
            cedinia-arm64.apk
            cedinia-armv7.apk
            cedinia-universal.apk

      - name: Release
        uses: softprops/action-gh-release@v2
        if: ${{ github.ref == 'refs/heads/master' && vars.HAVE_PAT_REPOSITORY_TOKEN == '1' }}
        with:
          tag_name: "Nightly"
          files: |
            cedinia-arm64.apk
            cedinia-armv7.apk
            cedinia-universal.apk
          token: ${{ secrets.PAT_REPOSITORY }}